<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel IPTV | Login</title>
    <style>
        /* Estilo Dark Mode com Azul Elétrico */
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #121212;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #00d4ff; /* Borda Neon */
            box-shadow: 0px 0px 20px rgba(0, 212, 255, 0.3);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        h1 {
            color: #00d4ff;
            margin-bottom: 20px;
            font-size: 24px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            box-sizing: border-box; /* Garante que o padding não quebre a largura */
        }

        input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #00d4ff;
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #008fb3;
            box-shadow: 0px 0px 10px #00d4ff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ÁREA DO CLIENTE</h1>
        <form>
            <input type="text" placeholder="Usuário" required>
            <input type="password" placeholder="Senha" required>
            <button type="submit">ENTRAR NO PAINEL</button>
        </form>
    </div>

</body>
</html>
